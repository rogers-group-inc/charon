version: 2
updates:
  # Server (Node.js / npm) — repo root
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Endpoint agent (Rust / Cargo) — Tauri app
  - package-ecosystem: "cargo"
    directory: "/agent"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
