name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Guard so CI stays green during early scaffolding (no package.json yet).
      - name: Detect Node project
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No package.json yet — skipping lint/test (scaffolding phase)."
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        run: npm ci

      - name: Lint
        if: steps.detect.outputs.present == 'true'
        run: npm run lint --if-present

      - name: Typecheck
        if: steps.detect.outputs.present == 'true'
        run: npm run typecheck --if-present

      - name: Check docs present
        if: steps.detect.outputs.present == 'true'
        run: npm run check:docs --if-present

      - name: Test
        if: steps.detect.outputs.present == 'true'
        run: npm test --if-present
