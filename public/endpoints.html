<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charon — Endpoints</title>
  <script src="/js/theme-init.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/charon.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>Endpoints</h2>
        <div class="page-header-actions">
          <button class="btn btn-primary" id="inviteBtn">+ Invitation</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr><th>Host</th><th>Status</th><th>User</th><th>IP / MAC</th><th>Posture</th><th>Tags</th><th>Last seen</th><th></th></tr>
          </thead>
          <tbody id="epBody"><tr><td colspan="8" class="empty-state">Loading…</td></tr></tbody>
        </table>
      </div>

      <div class="page-header" style="margin-top:2rem"><h2 style="font-size:1.1rem">Invitation codes</h2></div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr><th>Label</th><th>Prefix</th><th>Uses</th><th>Expires</th><th>Status</th><th></th></tr>
          </thead>
          <tbody id="invBody"><tr><td colspan="6" class="empty-state">Loading…</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="inviteModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Create invitation code</h3>
        <button class="btn-icon" id="inviteClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group"><label for="iLabel">Label (optional)</label><input id="iLabel" type="text" placeholder="Q3 laptop rollout"></div>
        <div class="form-group"><label for="iUses">Max uses</label><input id="iUses" type="number" value="1" min="1"></div>
        <div class="form-group"><label for="iExpiry">Expires in (hours, blank = never)</label><input id="iExpiry" type="number" min="1"></div>
        <div id="inviteResult" hidden>
          <p class="form-success">Code created — copy it now, it won't be shown again:</p>
          <pre id="inviteCode" style="white-space:pre-wrap;word-break:break-all;background:var(--color-bg-secondary);padding:0.75rem;border-radius:var(--radius-md);font-family:var(--font-mono)"></pre>
        </div>
        <p id="inviteError" class="form-error" hidden></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="inviteClose2">Close</button>
        <button class="btn btn-primary" id="inviteCreate">Create</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/endpoints.js"></script>
</body>
</html>
