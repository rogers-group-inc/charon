<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charon — Events</title>
  <script src="/js/theme-init.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/charon.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>Events</h2>
        <div class="page-header-actions">
          <button class="btn btn-secondary" id="btn-columns">Columns ▾</button>
          <button class="btn btn-secondary" id="btn-refresh">Refresh</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table id="events-table">
          <thead>
            <tr>
              <th style="width:170px" data-sf-key="timestamp"    data-sf-type="date">Timestamp</th>
              <th style="width:90px"  data-sf-key="level"        data-sf-type="string" data-sf-options="info|warning|error">Level</th>
              <th style="width:200px" data-sf-key="action"       data-sf-type="string">Action</th>
              <th style="width:150px" data-sf-key="resourceName" data-sf-type="string" data-col-default-hidden="true">Resource</th>
              <th style="width:120px" data-sf-key="actor"        data-sf-type="string">Actor</th>
              <th                     data-sf-key="message"      data-sf-type="string">Message</th>
            </tr>
          </thead>
          <tbody id="eventsBody">
            <tr><td colspan="6" class="empty-state">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/table-sf.js"></script>
  <script src="/js/events.js"></script>
</body>
</html>
