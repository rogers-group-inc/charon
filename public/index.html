<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charon — Dashboard</title>
  <script src="/js/theme-init.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/charon.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <h2>Dashboard</h2>
      </div>

      <div class="dashboard-grid">
        <div class="card"><div class="card-title">Endpoints online</div><p class="metric" id="mEndpoints">—</p></div>
        <div class="card"><div class="card-title">Active sessions</div><p class="metric" id="mSessions">—</p></div>
        <div class="card"><div class="card-title">Tag / policy sync</div><p class="metric" id="mSync">—</p></div>
        <div class="card"><div class="card-title">Posture</div><p class="metric" id="mPosture">—</p></div>
        <div class="card"><div class="card-title">HA / leader</div><p class="metric" id="mLeader">—</p></div>
      </div>

      <p class="muted" style="margin-top:1.25rem">
        Live metrics wire up as the endpoint, tag, and enforcement subsystems
        populate. Enroll an agent from <a href="/endpoints.html">Endpoints</a> to
        get started.
      </p>
    </main>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
