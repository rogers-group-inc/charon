<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/theme-init.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charon — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/charon.css">
  <style>
    .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--color-bg-secondary); }
    .login-card {
      background: var(--color-bg-primary); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 2rem 2.5rem; width: 100%; max-width: 380px; box-shadow: var(--shadow-md);
    }
    .login-card h2 { text-align: center; margin: 0 0 0.25rem; font-size: 1.25rem; font-weight: 700; color: var(--color-text-primary); text-transform: uppercase; letter-spacing: 1px; }
    .login-card .subtitle { text-align: center; color: var(--color-text-tertiary); font-size: 0.8rem; margin-bottom: 1.5rem; letter-spacing: 0.5px; }
    .login-error { background: rgba(255,23,68,0.12); color: var(--color-danger); border: 1px solid rgba(255,23,68,0.3); border-radius: var(--radius-md); padding: 0.5rem 0.75rem; font-size: 0.85rem; margin-bottom: 1rem; }
    .login-card .btn-primary { width: 100%; justify-content: center; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h2>Charon</h2>
      <p class="subtitle">Zero Trust Network Access</p>
      <div class="login-error" id="loginError" hidden></div>
      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <div class="form-group" id="totpGroup" hidden>
          <label for="totp">Verification code</label>
          <input type="text" id="totp" name="totp" inputmode="numeric" autocomplete="one-time-code" placeholder="123456">
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Sign in</button>
      </form>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
