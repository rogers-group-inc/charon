<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Charon — Sign in</title>
  <script src="/js/theme-init.js"></script>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/charon.css" />
</head>
<body class="login-body">
  <main class="login-card">
    <h1 class="login-title">Charon</h1>
    <p class="login-subtitle">Zero Trust Network Access</p>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <div class="form-group" id="totpGroup" hidden>
        <label for="totp">Verification code</label>
        <input id="totp" name="totp" type="text" inputmode="numeric" autocomplete="one-time-code" />
      </div>
      <p id="loginError" class="form-error" role="alert" hidden></p>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign in</button>
    </form>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
